<div class="login-container">
  <mat-card class="login-card">
    <mat-card-header>
      <mat-card-title>
        <mat-icon>lock</mat-icon>
        Login
      </mat-card-title>
      <mat-card-subtitle>Entre com suas credenciais</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      @if (error()) {
        <div class="error-message">
          <mat-icon>error</mat-icon>
          {{ error() }}
        </div>
      }

      <form>
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Email</mat-label>
          <input matInput type="email" [formField]="loginForm.email" placeholder="seu@email.com" />
          <mat-icon matPrefix>email</mat-icon>
          <app-form-error [control]="loginForm.email"></app-form-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Senha</mat-label>
          <input
            matInput
            [type]="hidePassword() ? 'password' : 'text'"
            [formField]="loginForm.password"
            placeholder="Sua senha"
          />
          <mat-icon matPrefix>lock</mat-icon>
          <button
            mat-icon-button
            matSuffix
            type="button"
            (click)="togglePasswordVisibility()"
            [attr.aria-label]="'Mostrar senha'"
          >
            <mat-icon>{{ hidePassword() ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
          <app-form-error [control]="loginForm.password"></app-form-error>
        </mat-form-field>

        <button
          mat-raised-button
          color="primary"
          type="button"
          class="full-width submit-button"
          [disabled]="!canSubmit()"
          (click)="onSubmit()"
        >
          @if (isLoading()) {
            <mat-spinner diameter="20"></mat-spinner>
            Entrando...
          } @else {
            Entrar
          }
        </button>
      </form>

      <div class="demo-credentials">
        <p><strong>Credenciais de teste:</strong></p>
        <p>Admin: admin&#64;admin.com / admin123</p>
        <p>User: user&#64;user.com / user123</p>
      </div>
    </mat-card-content>
  </mat-card>
</div>
